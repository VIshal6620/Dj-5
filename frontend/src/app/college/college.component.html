<app-navbar></app-navbar>

<div align="center"
     style="
     background-image: url('assets/2.jpg');
     background-size: cover;
     background-position: center;
     min-height: 90vh;
     padding-top: 100px;
     ">

    <!-- Heading -->
    <h1 *ngIf="!form.data.id" style="margin-bottom: 10px; color: white; font-weight: bold;">
        Add College
    </h1>

    <h1 *ngIf="form.data.id>0" style="margin-bottom: 10px; color: white; font-weight: bold;">
        Update College
    </h1>

    <!-- Message -->
    <div style="height: 20px; margin-bottom: 15px;">
        <h5 style="color: lightgreen;" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 style="color: red;" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <!-- ✅ CARD STYLE (same table inside) -->
    <div style="
        background: rgba(255,255,255,0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
        display: inline-block;
    ">

        <table>

            <tr>
                <th align="left">Name<span style="color: red">*</span></th>
                <td>
                    <input type="text" class="form-control"
                           name="name"
                           [(ngModel)]="form.data.name"
                           placeholder="Enter College Name">
                </td>
                <td style="color: red;">{{form.inputerror.name}}</td>
            </tr>

            <tr>
                <th align="left">Address<span style="color: red">*</span></th>
                <td>
                    <input type="text" class="form-control"
                           name="address"
                           [(ngModel)]="form.data.address"
                           placeholder="Enter Address">
                </td>
                <td style="color: red;">{{form.inputerror.address}}</td>
            </tr>

            <tr>
                <th align="left">State<span style="color: red">*</span></th>
                <td>
                    <input type="text" class="form-control"
                           name="state"
                           [(ngModel)]="form.data.state"
                           placeholder="Enter State">
                </td>
                <td style="color: red;">{{form.inputerror.state}}</td>
            </tr>

            <tr>
                <th align="left">City<span style="color: red">*</span></th>
                <td>
                    <input type="text" class="form-control"
                           name="city"
                           [(ngModel)]="form.data.city"
                           placeholder="Enter City">
                </td>
                <td style="color: red;">{{form.inputerror.city}}</td>
            </tr>

            <tr>
                <th align="left">Phone No<span style="color: red">*</span></th>
                <td>
                    <input type="text" class="form-control"
                           name="phoneNumber"
                           [(ngModel)]="form.data.phoneNumber"
                           maxlength="10"
                           placeholder="Enter Phone No.">
                </td>
                <td style="color: red;">{{form.inputerror.phoneNumber}}</td>
            </tr>

            <tr>
                <th></th>
                <td align="left" colspan="2" style="padding-top: 15px;">
                    <button class="btn btn-primary" (click)="submit()">Save</button>
                </td>
            </tr>

        </table>

    </div>
</div>

<app-footer></app-footer>
