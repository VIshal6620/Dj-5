<app-navbar></app-navbar>

<div
     style="
     background-image: url('assets/whit.jpg');
     background-size: cover;
     background-position: center;
     min-height: 90vh;
     padding: 80px 20px;
     ">

    <!-- Heading -->
    <h1 align="center" style="margin-bottom: 10px; color: rgb(34, 19, 198);">
        Role List
    </h1>

    <!-- Message -->
    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h5 style="color: lightgreen;" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 style="color: red;" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <!-- ✅ FULL WIDTH CONTAINER (IMPORTANT FIX) -->
    <div style="
        width: 100%;
        margin: auto;
        padding: 15px;
        background: rgba(255,255,255,0.95);
        border-radius: 10px;
    ">

        <div *ngIf="form.list.length > 0">

            <!-- Search -->
            <table style="width: 100%">
                <tr>
                    <td align="center">
                        <label><b>Role: </b></label>

                        <select name="id" [(ngModel)]="form.id" style="width: 200px;">
                            <option value="undefined">------------Select------------</option>
                            <option *ngFor="let obj of form.preload.roleList" [value]="obj.id">
                                {{obj.name}}
                            </option>
                        </select>

                        <button (click)="search()">Search</button>
                        <button (click)="reset()">Reset</button>
                    </td>
                </tr>
            </table>

            <br>

            <!-- ✅ TABLE FULL WIDTH -->
            <table border="1"
                   style="
                   width: 100%;
                   border-collapse: collapse;
                   text-align: center;
                   ">

                <tr style="background-color: #e1e6f1e3;">
                    <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" /></th>
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Edit</th>
                </tr>

                <tr *ngFor="let m of form.list; let i = index">
                     <td>
            <input type="checkbox"
                   #checkboxes
                   (change)="checklistUpdate()"
                   [id]="m.id"
                   [value]="isMasterSel">
          </td>

                    <td>{{(form.pageNo*5)+i+ 1}}</td>
                    <td>{{m.name}}</td>

                    <!-- ✅ TEXT WRAP FIX -->
                    <td style="word-wrap: break-word; max-width: 300px;">
                        {{m.description}}
                    </td>

                    <td>
                        <a (click)="forward('/role/' +  m.id)"
                           style="cursor: pointer; color: blue;">
                            Edit
                        </a>
                    </td>
                </tr>

            </table>

            <br>

            <!-- Buttons -->
            <table style="width: 100%">
                <tr>
                    <td style="width: 25%">
                        <button (click)="previous()" [disabled]="form.pageNo == 0">Previous</button>
                    </td>

                    <td align="center" style="width: 25%">
                        <button (click)="forward('/role')">New</button>
                    </td>

                    <td align="center" style="width: 25%">
                        <button (click)="delete()">Delete</button>
                    </td>

                    <td style="width: 25%" align="right">
                        <button [disabled]="form.list.length < 5" (click)="next()">Next</button>
                    </td>
                </tr>
            </table>

        </div>

        <!-- No Data -->
        <div *ngIf="form.list.length == 0" align="center">
            <button (click)="reset()">Back</button>
        </div>

    </div>
</div>

<app-footer></app-footer>
