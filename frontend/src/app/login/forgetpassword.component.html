<app-navbar></app-navbar>

<div align="center"
     style="
     background-image: url('assets/email.jpg');
     background-size: cover;
     background-position: center;
     min-height: 100vh;
     padding-top: 120px;
     ">
<br><br>
    <h1 style="margin-bottom: 5px; color: rgba(27, 27, 215, 0.669)">Forget Password</h1>

    <!-- Message -->
    <div style="height: 20px; margin-bottom: 10px;">
        <h5 class="text-success" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 class="text-danger" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <!-- TABLE CARD STYLE -->
    <table class="table table-bordered w-auto shadow"
           style="background: rgba(163, 173, 206, 0.9); border-radius:10px;">

        <tr>
            <th class="text-start p-3">
                Login Id <span class="text-danger">*</span>
            </th>

            <td class="p-3">
                <input type="text"
                       class="form-control"
                       [(ngModel)]="form.data.loginId"
                       placeholder="Enter Login ID">
                <small class="text-danger">{{form.inputerror.loginId}}</small>
            </td>

            <td class="p-3">
                <button class="btn btn-primary" (click)="submit()">
                    <i class="fa-solid fa-paper-plane"></i> Go
                </button>
            </td>
        </tr>

    </table>

</div>

<app-footer></app-footer>
