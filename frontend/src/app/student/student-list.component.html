<app-navbar></app-navbar>

<div
     style="
     background-image: url('assets/whit.jpg');
     background-size: cover;
     background-position: center;
     min-height: 90vh;
     padding: 80px 20px;
     ">

    <!-- Heading -->
    <h1 align="center" style="margin-bottom: 10px; color: rgb(39, 17, 208); font-weight: bold;">
        Student List
    </h1>

    <!-- Message -->
    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h5 style="color: lightgreen;" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 style="color: red;" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <!-- ✅ FULL WIDTH -->
    <div style="
        width: 100%;
        background: rgba(255,255,255,0.95);
        padding: 20px;
        border-radius: 10px;
        overflow-x: auto;
    ">

        <div *ngIf="form.list.length > 0">

            <!-- Search -->
            <table style="width: 100%">
                <tr>
                    <td align="center">

                        <label><b>Student Name: </b></label>
                        <input type="text"
                               class="form-control d-inline w-auto"
                               name="firstName"
                               [(ngModel)]="form.firstName"
                               placeholder="Enter Student Name">

                        <label class="ms-3"><b>College Name: </b></label>
                        <input type="text"
                               class="form-control d-inline w-auto"
                               name="collegeName"
                               [(ngModel)]="form.collegeName"
                               placeholder="Enter College Name">

                        <button class="btn btn-primary btn-sm ms-2" (click)="search()">Search</button>
                        <button class="btn btn-secondary btn-sm ms-2" (click)="reset()">Reset</button>

                    </td>
                </tr>
            </table>

            <br>

            <!-- Table -->
            <table border="1"
                   class="table table-bordered table-hover text-center align-middle"
                   style="width: 100%; min-width: 1000px;">

                <tr class="table-primary">
                    <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" /></th>
                    <th>S.No</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>DOB</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>College</th>
                    <th>Edit</th>
                </tr>

                <tr *ngFor="let m of form.list; let i = index">
                     <td>
            <input type="checkbox"
                   #checkboxes
                   (change)="checklistUpdate()"
                   [id]="m.id"
                   [value]="isMasterSel">
          </td>

                    <td>{{(form.pageNo*5)+i+ 1}}</td>
                    <td>{{m.firstName}}</td>
                    <td>{{m.lastName}}</td>
                    <td>{{m.dob | date : 'dd-MM-yyyy'}}</td>
                    <td>{{m.mobileNumber}}</td>
                    <td>{{m.email}}</td>
                    <td>{{m.collegeName}}</td>

                    <!-- ✅ EDIT FIX -->
                    <td>
                        <a (click)="forward('/student/' + m.id)"
                           class="btn btn-sm btn-outline-primary">
                            <i class="fa fa-edit"></i> Edit
                        </a>
                    </td>
                </tr>

            </table>

            <br>

            <!-- Buttons -->
            <table style="width: 100%">
                <tr>

                    <td style="width: 25%">
                        <button class="btn btn-outline-primary"
                                (click)="previous()"
                                [disabled]="form.pageNo == 0">
                            Previous
                        </button>
                    </td>

                    <td align="center" style="width: 25%">
                        <button class="btn btn-success"
                                (click)="forward('/student')">
                            New
                        </button>
                    </td>

                    <td align="center" style="width: 25%">
                        <button class="btn btn-danger"
                                (click)="delete()">
                            Delete
                        </button>
                    </td>

                    <td style="width: 25%" align="right">
                        <button class="btn btn-outline-primary"
                                (click)="next()"
                                [disabled]="form.list.length == 0 || form.list[form.list.length-1].id == form.lastId">
                            Next
                        </button>
                    </td>

                </tr>
            </table>

        </div>

        <!-- No Data -->
        <div *ngIf="form.list.length == 0" align="center">
            <button class="btn btn-secondary" (click)="reset()">Back</button>
        </div>

    </div>
</div>

<app-footer></app-footer>
