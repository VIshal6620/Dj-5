<app-navbar></app-navbar>

<div align="center"
     style="
     background-image: url('assets/2.jpg');
     background-size: cover;
     background-position: center;
     min-height: 90vh;
     padding-top: 100px;
     ">

    <!-- Heading -->
    <h1 *ngIf="!form.data.id" style="margin-bottom: 10px; color: white; font-weight: bold;">
        Add Subject
    </h1>

    <h1 *ngIf="form.data.id>0" style="margin-bottom: 10px; color: white; font-weight: bold;">
        Update Subject
    </h1>

    <!-- Message -->
    <div style="height: 20px; margin-bottom: 15px;">
        <h5 style="color: lightgreen;" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 style="color: red;" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <!-- ✅ CARD STYLE -->
    <div style="
        background: rgba(255,255,255,0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
        display: inline-block;
    ">

        <table>

            <!-- Name -->
            <tr>
                <th align="left">Name<span style="color: red">*</span></th>
                <td>
                    <input type="text"
                           class="form-control"
                           name="name"
                           [(ngModel)]="form.data.name"
                           placeholder="Enter Subject Name">
                </td>
                <td style="color: red;">{{form.inputerror.name}}</td>
            </tr>

            <!-- Description -->
            <tr>
                <th align="left">Description<span style="color: red">*</span></th>
                <td>
                    <textarea
                        class="form-control"
                        name="description"
                        [(ngModel)]="form.data.description"
                        rows="3"
                        placeholder="Enter Short description">
                    </textarea>
                </td>
                <td style="color: red;">{{form.inputerror.description}}</td>
            </tr>

            <!-- Course -->
            <tr>
                <th align="left">Course<span style="color: red">*</span></th>
                <td>
                    <select name="courseId"
                            class="form-select"
                            [(ngModel)]="form.data.courseId">
                        <option value="undefined">------------Select------------</option>
                        <option *ngFor="let obj of form.preload.courseList" [value]="obj.id">
                            {{obj.name}}
                        </option>
                    </select>
                </td>
                <td style="color: red;">{{form.inputerror.courseId}}</td>
            </tr>

            <!-- Button -->
            <tr>
                <th></th>
                <td align="left" colspan="2" style="padding-top: 15px;">
                    <button class="btn btn-primary" (click)="submit()">
                        Save
                    </button>
                </td>
            </tr>

        </table>

    </div>
</div>

<app-footer></app-footer>
